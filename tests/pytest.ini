[pytest]
# PDF ADA Compliance Processor - Test Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Encoding for Windows compatibility
filterwarnings = 
    # Ignore warnings about pikepdf C API changes
    ignore::DeprecationWarning:pikepdf.*
    
# Test markers
markers =
    slow: marks tests as slow (select with -m "not slow")
    integration: marks tests requiring actual PDF files
    win32: marks tests specific to Windows

# Default timeout for long-running tests
timeout = 120

# Add coverage report if requested via --cov flag
addopts = -v --tb=short --strict-markers
